```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio de Unhas</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff0f5, #ffe4ec);
}

/* Header */
header {
    background: #ff1493;
    color: white;
    text-align: center;
    padding: 30px;
}

/* Menu */
nav {
    background: #ff69b4;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* Seções */
section {
    padding: 40px;
    text-align: center;
}

/* Serviços */
.servicos {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    cursor: pointer;
}

/* Galeria */
.galeria {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.galeria img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.galeria img:hover {
    transform: scale(1.05);
}

/* Modal estilo Instagram */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    text-align: center;
}

.modal img {
    max-width: 90%;
    max-height: 80%;
    margin-top: 50px;
    border-radius: 10px;
}

.close, .prev, .next {
    position: absolute;
    color: white;
    font-size: 30px;
    cursor: pointer;
}

.close {
    top: 20px;
    right: 40px;
}

.prev {
    top: 50%;
    left: 30px;
}

.next {
    top: 50%;
    right: 30px;
}

/* Botão */
.btn {
    background: #ff1493;
    color: white;
    padding: 12px 25px;
    border-radius: 25px;
    text-decoration: none;
}

/* WhatsApp fixo */
.whatsapp-fixo {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

/* Rodapé */
footer {
    background: #ff1493;
    color: white;
    padding: 20px;
}
</style>

</head>

<body>

<header>
    <h1>Studio de Unhas 💅</h1>
    <p>Beleza e cuidado para suas mãos</p>
</header>

<nav>
    <a href="#inicio">Início</a>
    <a href="#servicos">Serviços</a>
    <a href="#galeria">Galeria</a>
    <a href="#contato">Contato</a>
</nav>

<section id="inicio">
    <h2>Bem-vinda!</h2>
    <p>Unhas lindas e bem cuidadas para você.</p>
</section>

<section id="servicos">
    <h2>Serviços</h2>
    <div class="servicos">
        <div class="card">Manicure</div>
        <div class="card">Pedicure</div>
        <div class="card">Alongamento</div>
    </div>
</section>

<section id="galeria">
    <h2>Galeria de Unhas</h2>

    <div class="galeria">
        <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371" onclick="abrirModal(0)">
        <img src="https://images.unsplash.com/photo-1610992015732-2449b76344bc" onclick="abrirModal(1)">
        <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5" onclick="abrirModal(2)">
        <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30" onclick="abrirModal(3)">
    </div>
</section>

<section id="contato">
    <h2>Contato</h2>
    <a href="https://wa.me/qr/RAXL2NFIIFSDB1" target="_blank" class="btn">
        Falar no WhatsApp 💬
    </a>
</section>

<!-- Modal -->
<div id="modal" class="modal">
    <span class="close" onclick="fecharModal()">&times;</span>
    <span class="prev" onclick="mudar(-1)">❮</span>
    <img id="imgModal">
    <span class="next" onclick="mudar(1)">❯</span>
</div>

<!-- Botão flutuante -->
<a href="https://wa.me/qr/RAXL2NFIIFSDB1" target="_blank" class="whatsapp-fixo">
💬
</a>

<footer>
    <p>© 2026 Studio de Unhas</p>
</footer>

<script>
let imagens = [
    "https://images.unsplash.com/photo-1604654894610-df63bc536371",
    "https://images.unsplash.com/photo-1610992015732-2449b76344bc",
    "https://images.unsplash.com/photo-1588776814546-1ffcf47267a5",
    "https://images.unsplash.com/photo-1596464716127-f2a82984de30"
];

let index = 0;

function abrirModal(i) {
    index = i;
    document.getElementById("modal").style.display = "block";
    document.getElementById("imgModal").src = imagens[index];
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

function mudar(n) {
    index += n;

    if (index < 0) index = imagens.length - 1;
    if (index >= imagens.length) index = 0;

    document.getElementById("imgModal").src = imagens[index];
}
</script>

</body>
</html>
```
